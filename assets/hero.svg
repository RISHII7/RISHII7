<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" role="img" aria-label="Rushikesh">
  <defs>
    <linearGradient id="txt" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="600" y2="0">
      <stop offset="0" stop-color="#22d3ee"/><stop offset=".5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#3b82f6"/>
      <animate attributeName="x1" values="-400;600" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1000" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14"/><stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8b5cf6" stroke-width=".5" stroke-opacity=".12"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes blink{50%{opacity:0}}
      @keyframes scan{from{transform:translateY(-4px)}to{transform:translateY(260px)}}
      @keyframes flo{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
      .t{animation:up 1.1s ease-out both}.s{animation:up 1.1s ease-out .45s both}
      .c{animation:blink 1s steps(1) infinite}.ln{animation:scan 4.5s linear infinite}
      .p{animation:flo 5s ease-in-out infinite}
    </style>
  </defs>
  <rect width="1000" height="260" rx="16" fill="url(#bg)"/>
  <rect width="1000" height="260" rx="16" fill="url(#grid)"/>
  <g fill="#22d3ee">
    <circle class="p" cx="110" cy="60" r="2"/>
    <circle class="p" cx="900" cy="80" r="2.5" style="animation-delay:1s"/>
    <circle class="p" cx="200" cy="210" r="1.8" style="animation-delay:.4s" fill="#8b5cf6"/>
    <circle class="p" cx="820" cy="200" r="2" style="animation-delay:1.6s" fill="#3b82f6"/>
    <circle class="p" cx="70" cy="170" r="1.6" style="animation-delay:2.1s"/>
    <circle class="p" cx="940" cy="150" r="1.6" style="animation-delay:.8s" fill="#8b5cf6"/>
  </g>
  <g class="t" filter="url(#glow)">
    <text x="500" y="132" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="76" font-weight="800" letter-spacing="6" fill="url(#txt)">RUSHIKESH</text>
  </g>
  <text class="s" x="500" y="178" text-anchor="middle" font-family="'JetBrains Mono','Consolas',monospace" font-size="16" letter-spacing="4" fill="#94a3b8">FULL-STACK ENGINEER &#183; SERVERLESS ARCHITECT &#183; AI BUILDER<tspan class="c" fill="#22d3ee">_</tspan></text>
  <rect class="ln" x="0" y="0" width="1000" height="2" fill="#8b5cf6" opacity=".22"/>
  <rect x="1.5" y="1.5" width="997" height="257" rx="16" fill="none" stroke="#8b5cf6" stroke-opacity=".4" stroke-width="1.5"/>
</svg>
