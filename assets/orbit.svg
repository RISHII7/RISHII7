<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="tech orbit">
  <defs>
    <radialGradient id="core" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="og" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="#0d1117"/>
  <g fill="none" stroke-opacity=".35">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="18s" repeatCount="indefinite"/>
      <ellipse cx="200" cy="200" rx="150" ry="60" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="350" cy="200" r="6" fill="#8b5cf6" stroke="none"/>
      <circle cx="50" cy="200" r="4" fill="#3b82f6" stroke="none"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="26s" repeatCount="indefinite"/>
      <ellipse cx="200" cy="200" rx="60" ry="150" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="200" cy="50" r="6" fill="#22d3ee" stroke="none"/>
      <circle cx="200" cy="350" r="4" fill="#8b5cf6" stroke="none"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="34s" repeatCount="indefinite"/>
      <circle cx="200" cy="200" r="120" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 7"/>
      <circle cx="320" cy="200" r="5" fill="#22d3ee" stroke="none"/>
    </g>
  </g>
  <circle cx="200" cy="200" r="34" fill="url(#core)" filter="url(#og)">
    <animate attributeName="r" values="32;36;32" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="209" text-anchor="middle" font-family="monospace" font-size="26" font-weight="700" fill="#0d1117">&lt;/&gt;</text>
</svg>
